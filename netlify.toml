# Netlify configuration for the GoCoding static site.
# The project uses Next.js static export (output: 'export'), so Netlify just
# serves the pre-built `out/` directory — no Next.js runtime needed.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"

# Set NEXT_PUBLIC_SITE_URL to your production domain in:
#   Netlify dashboard → Site settings → Environment variables
# Example: https://www.yourdomain.com

# Static export already emits per-route index.html files; this keeps direct
# visits and refreshes on nested routes working.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
